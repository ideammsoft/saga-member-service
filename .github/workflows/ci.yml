name: member-service CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    # -------------------- MySQL 설정 --------------------
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: liveshop
          MYSQL_USER: liveshop
          MYSQL_PASSWORD: "1234"
          MYSQL_ROOT_PASSWORD: "1234"
        options: >-
          --tmpfs /var/lib/mysql
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p1234 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      SERVICE_NAME: saga-member-service
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CONFIG_IMPORT: "optional:none"
      SPRING_CLOUD_CONFIG_FAIL_FAST: "false"
      SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED: "false"
      EUREKA_CLIENT_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: test
      IMAGE_REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: saga-member-service
      IMAGE_TAG: ${{ github.sha }}

      # DB 접속정보 (Service name인 'mysql' 대신 127.0.0.1 사용)
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/liveshop?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: "liveshop"
      SPRING_DATASOURCE_PASSWORD: "1234"
      # [추가] 테이블 자동 생성을 위한 JPA 설정 강제 주입
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21(Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Check files
        run: ls -R

      - name: 그래들에 실행권한 부여
        run: chmod +x gradlew

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -p1234 --silent; then
              echo "MySQL is UP" 
              # [핵심 교정] 에러 방지를 위해 provider 테이블 수동 생성 (애플리케이션 설정이 완벽하지 않을 경우 대비)
              mysql -h 127.0.0.1 -uliveshop -p1234 liveshop -e "
                CREATE TABLE IF NOT EXISTS provider (
                  provider_id BIGINT AUTO_INCREMENT PRIMARY KEY,
                  provider_name VARCHAR(255) NOT NULL
                );
              "
              exit 0 
            fi
            echo "waiting mysql...($i)"
            sleep 2 
          done
          exit 1 

      - name: Test 실행해보기
        run: ./gradlew test

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI Image By Buildpacks
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}


      - name: GHCR로 Push
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}