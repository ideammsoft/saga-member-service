env:
  # (기존 설정들...)
  SPRING_CLOUD_CONFIG_ENABLED: "false"      # Config Server 사용 안 함
  SPRING_CONFIG_IMPORT: "optional:configserver:" # 에러 방지를 위한 옵션 처리
  EUREKA_CLIENT_ENABLED: "false"             # 테스트 시 유레카 비활성화

  # DB 접속 정보 (서버에서 성공했던 옵션을 CI 테스트에도 동일하게 적용)
  SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/liveshop?useSSL=false&allowPublicKeyRetrieval=true
  SPRING_DATASOURCE_USERNAME: "liveshop"
  SPRING_DATASOURCE_PASSWORD: "1234"
  SPRING_JPA_HIBERNATE_DDL_AUTO: update