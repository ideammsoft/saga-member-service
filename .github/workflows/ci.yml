name: member-service CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    # -------------------- MySQL 설정 (CI 테스트용) --------------------
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: liveshop
          MYSQL_USER: liveshop
          MYSQL_PASSWORD: "1234"
          MYSQL_ROOT_PASSWORD: "1234"
        options: >-
          --tmpfs /var/lib/mysql
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p1234 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      SERVICE_NAME: saga-member-service
      IMAGE_REGISTRY: ghcr.io
      IMAGE_OWNER: ${{ github.repository_owner }}
      IMAGE_NAME: saga-member-service
      IMAGE_TAG: ${{ github.sha }}

      # CI 환경 DB 접속 정보
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/liveshop?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: "liveshop"
      SPRING_DATASOURCE_PASSWORD: "1234"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21(Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 그래들에 실행권한 부여
        # gradlew 파일명을 명시하여 에러 방지
        run: chmod +x gradlew

      - name: Test 실행해보기
        run: ./gradlew test

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI Image (인증서 에러 해결 포함)
        run: |
          # GCP 서버의 인증서 로더 에러 해결을 위한 설정 주입
          ./gradlew bootBuildImage \
            --imageName=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -Dspring-boot.build-image.env.BPL_ENABLE_OPENSSL_CERTIFICATE_LOADER=false
          
          # 서버에서 사용하기 편하도록 latest 태그 추가 생성
          docker tag ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
                     ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest

      - name: GHCR로 Push
        if: github.event_name == 'push'
        run: |
          # 해시 태그와 latest 태그 모두 푸시
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest